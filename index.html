<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador Automático de Apps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="sidebar">
            <h2>Criador de Apps v2.5</h2>
            
            <div class="api-key-container">
                <label for="api-key-input">Chave API Gemini (AIzaSy...):</label>
                <input type="password" id="api-key-input" placeholder="Cole sua chave AI Studio aqui">
            </div>

            <div class="input-container">
                <label for="user-input">O que você quer criar ou alterar?</label>
                <textarea id="user-input" placeholder="Ex: Crie um app de tarefas... ou depois: Mude o fundo para azul..."></textarea>
            </div>
            
            <button id="btn-generate">Processar Aplicativo</button>

            <hr class="divider">

            <div class="tabs">
                <button id="tab-btn-prompt" class="nav-btn active" onclick="switchTab('prompt')">Prompt</button>
                <button id="tab-btn-code" class="nav-btn" onclick="switchTab('code')">Código Fonte</button>
            </div>
            
            <div id="tab-content-prompt" class="tab-content">
                <textarea id="output-prompt" readonly placeholder="O prompt interno gerado aparecerá aqui..."></textarea>
            </div>
            <div id="tab-content-code" class="tab-content" style="display:none;">
                <textarea id="output-code" readonly placeholder="O código HTML gerado aparecerá aqui..."></textarea>
            </div>
        </aside>

        <main class="preview-area">
            <div class="device-controls">
                <button class="device-btn" onclick="changeDevice('mobile')">📱 Celular</button>
                <button class="device-btn" onclick="changeDevice('tablet')">📟 Tablet</button>
                <button class="device-btn" onclick="changeDevice('desktop')">💻 Desktop</button>
                <button class="device-btn btn-fullscreen" onclick="toggleFullscreen()">📺 Tela Cheia</button>
            </div>

            <div id="device-simulator" class="device-desktop">
                <iframe id="app-preview" srcdoc="<div style='font-family:sans-serif; text-align:center; padding-top:100px; color:#888;'><h2>Pronto para começar</h2><p>Digite sua ideia ao lado e clique em Processar.</p></div>"></iframe>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
